<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <script>
      // Runs synchronously before first paint so there's no flash of the wrong theme.
      // Keep this in perfect sync with getInitialTheme() in src/context/ThemeContext.jsx.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
          if (isDark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%98%80%EF%B8%8F</text></svg>"
    />

    <title>Commercial Solar Calculator - Corporate ROI &amp; Tax Incentives</title>
    <meta
      name="description"
      content="Calculate corporate solar ROI using live U.S. tax rules. Estimate system sizing, Section 48E Investment Tax Credits (ITC), and 5-Year MACRS depreciation."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.commercialsolarcalculator.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Commercial Solar Calculator - Corporate ROI &amp; Tax Incentives" />
    <meta
      property="og:description"
      content="Calculate corporate solar ROI using live U.S. tax rules. Estimate system sizing, Section 48E Investment Tax Credits (ITC), and 5-Year MACRS depreciation."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.commercialsolarcalculator.com/" />
    <meta property="og:site_name" content="Commercial Solar Calculator" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Commercial Solar Calculator - Corporate ROI &amp; Tax Incentives" />
    <meta
      name="twitter:description"
      content="Calculate corporate solar ROI using live U.S. tax rules. Estimate system sizing, Section 48E Investment Tax Credits (ITC), and 5-Year MACRS depreciation."
    />

    <!--
      Page-specific WebApplication/FinancialCalculator + FAQPage schema now lives in
      src/pages/HomePage.jsx, injected client-side via usePageMeta. It used to be static here,
      but that meant every route (this SPA serves the same index.html for all of them) carried
      the homepage's FAQ schema even on pages with no matching visible FAQ content. Organization
      schema stays static since it's accurate site-wide.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Commercial Solar Calculator",
        "url": "https://www.commercialsolarcalculator.com/",
        "description": "Publisher of a free, browser-based commercial solar ROI, tax credit, and MACRS depreciation calculator for U.S. businesses."
      }
    </script>
  </head>
  <body class="bg-white dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
